<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Keterangan Izin</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .izin-box { background-color: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); width: 100%; max-width: 480px; }
        h2 { text-align: center; color: #d97706; margin-bottom: 10px; }
        p { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        .info-user { background-color: #fef3c7; border: 1px solid #f59e0b; border-radius: 6px; padding: 12px; margin-bottom: 20px; font-size: 14px; color: #92400e; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #475569; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; background-color: #f8fafc; box-sizing: border-box; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #f59e0b; background-color: #ffffff; }
        .grid-durasi { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-submit { width: 100%; background-color: #d97706; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn-submit:hover { background-color: #b45309; }
        .btn-batal { width: 100%; background-color: #e2e8f0; color: #475569; border: none; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; text-align: center; text-decoration: none; display: block; box-sizing: border-box; transition: background 0.2s; }
        .btn-batal:hover { background-color: #cbd5e1; }
    </style>
</head>
<body>

    <div class="izin-box">
        <h2 id="titleHalaman">Form Keterangan Izin</h2>
        <p>Silakan lengkapi detail data perizinan santri di bawah ini.</p>

        <div class="info-user">
            <strong>👤 Nama:</strong> <span id="textNama">-</span><br>
            <strong>🚪 Kamar:</strong> <span id="textKamar">-</span>
        </div>

        <form id="formIzin" onsubmit="simpanDataIzin(event)">
            <div class="form-group grid-durasi">
                <div>
                    <label for="inputDurasi">🔢 Angka Durasi</label>
                    <input type="number" id="inputDurasi" min="1" placeholder="Contoh: 3" required>
                </div>
                <div>
                    <label for="selectSatuan">📅 Satuan Waktu</label>
                    <select id="selectSatuan" required>
                        <option value="jam">Jam</option>
                        <option value="hari">Hari</option>
                        <option value="minggu">Minggu</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="inputPengurus">✍️ Pengurus Penanggung Jawab</label>
                <input type="text" id="inputPengurus" placeholder="Nama pengurus yang memberi izin..." required style="text-transform: uppercase;">
            </div>

            <div class="form-group">
                <label for="inputTextKeterangan">📝 Alasan / Keterangan Izin</label>
                <textarea id="inputTextKeterangan" rows="3" placeholder="Contoh: Pulang karena acara keluarga / Sakit di UKS..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">💾 Simpan & Aktifkan Izin</button>
            <a href="index.html" class="btn-batal">❌ Batalkan</a>
        </form>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Konfigurasi Firebase Realtime Database Anda
    const firebaseConfig = {
        apiKey: "AIzaSyBxA...",
        authDomain: "absensi-besma.firebaseapp.com",
        databaseURL: "https://absensi-besma-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "absensi-besma",
        storageBucket: "absensi-besma.appspot.com",
        messagingSenderId: "1234567890",
        appId: "1:12345678:web:abcd1234"
    };
    
    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Variabel penampung lokal untuk sinkronisasi dengan awan
    let globalDataIzinAsrama = [];

    // Deteksi Mode Edit atau Input Baru via Session Storage bawaan asli
    const isEditMode = sessionStorage.getItem('editMode') === 'true';
    const editWaktuMulai = sessionStorage.getItem('editWaktuMulai');

    let nama = "";
    let kamar = "";

    // Ambil data secara real-time dari Firebase cloud
    db.ref('dataIzinAsrama').on('value', (snapshot) => {
        globalDataIzinAsrama = snapshot.val() || [];
        
        // Jalankan pengisian form otomatis jika dalam mode edit setelah data cloud sinkron
        if (isEditMode && editWaktuMulai) {
            const dataLama = globalDataIzinAsrama.find(item => String(item.waktuMulai) === String(editWaktuMulai));
            if (dataLama) {
                nama = dataLama.nama;
                kamar = dataLama.kamar;
                document.getElementById('textNama').innerText = nama.toUpperCase();
                document.getElementById('textKamar').innerText = "KAMAR " + kamar;
                document.getElementById('inputTextKeterangan').value = dataLama.keterangan || "";
                document.getElementById('inputPengurus').value = dataLama.pengurus || "";
                document.getElementById('titleHalaman').innerText = "📝 Edit Data Perizinan";
            }
        }
    });

    // Inisialisasi data lemparan awal saat halaman dimuat
    window.onload = function() {
        if (!isEditMode) {
            nama = sessionStorage.getItem('tempNama');
            kamar = sessionStorage.getItem('tempKamar');

            if (!nama || !kamar) {
                alert("Akses tidak sah! Silakan tentukan santri melalui Form Absensi atau Daftar Kamar.");
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('textNama').innerText = nama.toUpperCase();
            document.getElementById('textKamar').innerText = "KAMAR " + kamar;
        }
    };

    // ==================== FUNGSI UTAMA EKSEKUSI FORM ====================
    function simpanDataIzin(event) {
        event.preventDefault();

        const durasiAngka = parseInt(document.getElementById('inputDurasi').value);
        const satuanWaktu = document.getElementById('selectSatuan').value;
        const keterangan = document.getElementById('inputTextKeterangan').value.trim();
        const pengurus = document.getElementById('inputPengurus').value.trim().toUpperCase();

        if (!durasiAngka || durasiAngka < 1 || !keterangan || !pengurus) {
            alert("Harap isi seluruh data formulir dengan benar!");
            return;
        }

        // Kalkulasi perhitungan waktu milidetik sesuai kode asli
        let totalTambahanMilidetik = 0;
        if (satuanWaktu === 'jam') totalTambahanMilidetik = durasiAngka * 60 * 60 * 1000;
        else if (satuanWaktu === 'hari') totalTambahanMilidetik = durasiAngka * 24 * 60 * 60 * 1000;
        else if (satuanWaktu === 'minggu') totalTambahanMilidetik = durasiAngka * 7 * 24 * 60 * 60 * 1000;

        const durasiTeksBaru = `${durasiAngka} ${satuanWaktu}`;
        const waktuMulaiPilihan = Date.now();

        if (isEditMode) {
            // Edit item di dalam array berdasarkan waktuMulai yang cocok
            const index = globalDataIzinAsrama.findIndex(item => String(item.waktuMulai) === String(editWaktuMulai));
            if (index !== -1) {
                globalDataIzinAsrama[index].waktuMulai = waktuMulaiPilihan;
                globalDataIzinAsrama[index].waktuHabis = waktuMulaiPilihan + totalTambahanMilidetik;
                globalDataIzinAsrama[index].durasiTeks = durasiTeksBaru;
                globalDataIzinAsrama[index].keterangan = keterangan;
                globalDataIzinAsrama[index].pengurus = pengurus;
            }
        } else {
            // Tambahkan objek data izin baru ke dalam array
            const waktuHabisSkarang = waktuMulaiPilihan + totalTambahanMilidetik;
            globalDataIzinAsrama.push({ 
                waktuMulai: waktuMulaiPilihan,
                waktuHabis: waktuHabisSkarang, 
                durasiTeks: durasiTeksBaru,
                kamar: kamar, 
                nama: nama.toUpperCase(), 
                status: 'Izin', 
                keterangan: keterangan,
                pengurus: pengurus
            });
        }
        
        // Simpan array data terbaru kembali ke Firebase Cloud Node 'dataIzinAsrama'
        db.ref('dataIzinAsrama').set(globalDataIzinAsrama)
            .then(() => {
                // Bersihkan penampung temporary session bawaan asli
                sessionStorage.removeItem('tempNama');
                sessionStorage.removeItem('tempKamar');
                sessionStorage.removeItem('editMode');
                sessionStorage.removeItem('editWaktuMulai');
                
                window.location.href = 'izin1.html';
            })
            .catch((error) => {
                alert("Gagal menyimpan ke database cloud: " + error.message);
            });
    }
</script>
</body>
</html>
