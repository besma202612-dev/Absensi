<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Rekap Perizinan</title>
    <style>
        /* ==================== RESET & BASE LAYOUT ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .app-container { display: flex; min-height: 100vh; background-color: #f0f2f5; }

        /* ==================== STYLE SIDEBAR ==================== */
        .sidebar { width: 250px; background-color: #2c3e50; color: #ecf0f1; padding-top: 20px; position: fixed; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; z-index: 100; }
        .sidebar h2 { text-align: center; color: #ffffff; margin-bottom: 30px; font-size: 20px; letter-spacing: 1px; }
        .sidebar ul { list-style: none; }
        .sidebar ul li a { display: block; color: #bdc3c7; padding: 15px 25px; text-decoration: none; font-size: 16px; transition: all 0.3s ease; }
        .sidebar ul li a:hover { color: #ffffff; background-color: #34495e; padding-left: 35px; }
        .sidebar ul li a.active { background-color: #d97706; color: white; font-weight: bold; }

        /* ==================== MAIN CONTENT AREA ==================== */
        .main-content { flex: 1; margin-left: 250px; padding: 40px; box-sizing: border-box; min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .header-section h1 { color: #2c3e50; font-size: 26px; }

        /* ==================== TABLE STYLE ==================== */
        .table-container { background-color: #ffffff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #d97706; color: white; padding: 15px 20px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
        td { padding: 15px 20px; border-bottom: 1px solid #e2e8f0; font-size: 15px; color: #334155; }
        tr:hover { background-color: #f8fafc; }
        
        .nama-santri { font-weight: 600; color: #1e3a8a; cursor: pointer; }
        .nama-santri:hover { text-decoration: underline; color: #2563eb; }
        .badge-kamar { background-color: #e2e8f0; color: #334155; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        
        .countdown-active { color: #16a34a; font-weight: bold; background-color: #dcfce7; padding: 4px 10px; border-radius: 6px; }
        .status-expired { color: #dc2626; font-weight: bold; background-color: #fee2e2; padding: 4px 10px; border-radius: 6px; }
        .empty-state { text-align: center; color: #64748b; padding: 4px 0; font-style: italic; font-size: 15px; }

        /* Actions Button */
        .action-btn { border: none; padding: 6px 10px; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: bold; margin: 0 2px; }
        .btn-edit { background-color: #f59e0b; color: white; }
        .btn-delete { background-color: #10b981; color: white; }

        /* Dropdown detail row */
        .dropdown-detail-row { background-color: #f8fafc; }
        .card-detail-info { padding: 15px; border-left: 4px solid #d97706; margin: 5px 20px; background: #fff; border-radius: 4px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .card-detail-info p { margin: 6px 0; font-size: 14px; color: #475569; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <h2>ABSENSI BESMA</h2>
           <ul>
    <li><a href="index.html">📝 Form Absensi</a></li>
    <li><a href="list.html">🚪 Daftar Santri</a></li>
    <li><a href="daftar.html">📋 Rekap Absen</a></li>
    <li><a href="rekap.html">📊 Rekap Per Kamar</a></li>
    <li><a href="izin1.html">📝 Daftar Perizinan</a></li>
    <li><a href="history.html">📜 Riwayat Perizinan</a></li>
    <li><a href="izin2.html">🏥 Riwayat Sakit</a></li>
</ul>
        </div>

        <div class="main-content">
            <div class="header-section">
                <h1>⏳ Daftar Santri dalam Masa Perizinan</h1>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 5%;">No</th>
                            <th style="text-align: left; width: 30%;">Nama Santri</th>
                            <th style="width: 15%;">Kamar</th>
                            <th style="width: 20%;">Durasi / Mulai</th>
                            <th style="width: 15%;">Sisa Waktu</th>
                            <th style="width: 15%;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelIzinBody">
                        <tr>
                            <td colspan="6" class="empty-state">Menghubungkan ke database cloud...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

   <script>
    // ==================== CONFIGURATION FIREBASE SDK V8 ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDIxABuKyV-Yz6QkjTBEoj-tZUlqZFLt1s",
        authDomain: "absensi-besma.firebaseapp.com",
        databaseURL: "https://absensi-besma-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "absensi-besma",
        storageBucket: "absensi-besma.firebasestorage.app",
        messagingSenderId: "903515270638",
        appId: "1:903515270638:web:ba7bd2faa90674ccf6b2ff",
        measurementId: "G-398MW34FYK"
    };

    // Inisialisasi Firebase Realtime Database
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    
    let dataIzinGlobal = [];
    let riwayatIzinGlobal = [];

    // 1. OTOMATIS MEMBUAT DROPDOWN FILTER KAMAR DI ATAS TABEL ASLI
    function buatElemenFilterKamar() {
        // Cek apakah filter sudah ada agar tidak duplikat saat reload
        if (document.getElementById('filterKamarContainer')) return;

        const tableContainer = document.querySelector('.table-container');
        if (!tableContainer) return;

        // Membuat container filter dengan gaya minimalis agar tidak merusak desainmu
        const filterDiv = document.createElement('div');
        filterDiv.id = 'filterKamarContainer';
        filterDiv.style.marginBottom = '20px';
        filterDiv.style.display = 'flex';
        filterDiv.style.alignItems = 'center';
        filterDiv.style.gap = '10px';

        filterDiv.innerHTML = `
            <label for="pilihKamarFilter" style="font-size: 15px; font-weight: 600; color: #2c3e50;">🔍 Filter Per Kamar:</label>
            <select id="pilihKamarFilter" onchange="renderTabelSesuaiStrukturAsli()" style="padding: 8px 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; color: #334155; background-color: white; cursor: pointer;">
                <option value="SEMUA">-- Semua Kamar --</option>
            </select>
        `;

        // Memasang dropdown filter tepat di atas tabel asli kamu
        tableContainer.parentNode.insertBefore(filterDiv, tableContainer);
    }

    // UPDATE DAFTAR NOMOR KAMAR SECARA DINAMIS BERDASARKAN DATA YANG AKTIF
    function updatePilihanDropdownKamar() {
        const selectFilter = document.getElementById('pilihKamarFilter');
        if (!selectFilter) return;

        // Ambil semua nomor kamar unik dari data santri yang sedang izin
        const daftarKamar = [...new Set(dataIzinGlobal.map(item => item.kamar))].sort();
        
        // Simpan pilihan yang sedang dipilih user agar tidak reset saat realtime update
        const nilaiSekarang = selectFilter.value;

        // Set ulang isi opsi dropdown
        selectFilter.innerHTML = '<option value="SEMUA">-- Semua Kamar --</option>';
        daftarKamar.forEach(noKamar => {
            if (noKamar) {
                selectFilter.innerHTML += `<option value="${noKamar}">Kamar ${noKamar}</option>`;
            }
        });

        // Kembalikan ke pilihan user sebelumnya
        selectFilter.value = nilaiSekarang;
    }

    // 2. AMBIL DATA REALTIME DARI CLOUD
    function tampilkanData() {
        db.ref('dataIzinAsrama').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val) {
                dataIzinGlobal = Array.isArray(val) ? val : Object.keys(val).map(key => {
                    return { ...val[key], firebaseKey: key };
                });
                dataIzinGlobal = dataIzinGlobal.filter(item => item !== null && item.nama);
            } else {
                dataIzinGlobal = [];
            }
            buatElemenFilterKamar();
            updatePilihanDropdownKamar();
            renderTabelSesuaiStrukturAsli();
        });

        db.ref('riwayatIzinAsrama').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val) {
                riwayatIzinGlobal = Array.isArray(val) ? val : Object.values(val);
            } else {
                riwayatIzinGlobal = [];
            }
        });
    }

    // 3. RENDER DATA (100% PAKAI STRUKTUR DAN TOMBOL ASLI BAWAANMU + FITUR FILTER)
    function renderTabelSesuaiStrukturAsli() {
        const tabelBody = document.getElementById('tabelIzinBody');
        if (!tabelBody) return;

        tabelBody.innerHTML = '';
        const waktuSekarang = new Date().getTime();

        // Ambil nilai filter kamar yang dipilih pengurus
        const filterKamarAktif = document.getElementById('pilihKamarFilter')?.value || "SEMUA";

        // Saring data berdasarkan kamar yang dipilih
        const dataTerfilter = dataIzinGlobal.filter(item => {
            if (filterKamarAktif === "SEMUA") return true;
            return String(item.kamar) === String(filterKamarAktif);
        });

        if (dataTerfilter.length === 0) {
            tabelBody.innerHTML = `<tr><td colspan="6" class="empty-state" style="padding: 20px; text-align: center;">Tidak ada santri izin yang aktif di kamar ini.</td></tr>`;
            return;
        }

        dataTerfilter.forEach((item, index) => {
            const sisaWaktuMilidetik = item.waktuHabis - waktuSekarang;
            let teksHitungMundur = "";

            if (sisaWaktuMilidetik <= 0) {
                teksHitungMundur = `<span class="status-expired">⚠️ Waktu Habis</span>`;
                pindahOtomatisKeHistoryCloud(item);
            } else {
                const totalDetik = Math.floor(sisaWaktuMilidetik / 1000);
                const jam = Math.floor(totalDetik / 3600);
                const menit = Math.floor((totalDetik % 3600) / 60);
                teksHitungMundur = `<span class="countdown-active">⏳ ${jam}j ${menit}m</span>`;
            }

            const formatTanggalMulai = new Date(item.waktuMulai).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
            const idDetailDropdown = `detail_${index}`;

            // KEMBALI KE STRUKTUR BARIS DAN DESIGN ASLI EMAS MILIKMU
            const templateBaris = `
                <tr>
                    <td style="text-align:center; font-weight:bold; color:#7f8c8d;">${index + 1}</td>
                    <td><span class="nama-santri" onclick="toggleDropdown('${idDetailDropdown}', this)">▶ ${item.nama}</span></td>
                    <td style="text-align:center;"><span class="badge-kamar">Kamar ${item.kamar}</span></td>
                    <td style="text-align:center; color:#2c3e50; font-weight:500;">${item.durasiTeks} <small style="color:#7f8c8d; display:block;">(Mulai ${formatTanggalMulai})</small></td>
                    <td style="text-align:center; font-weight:600;">${teksHitungMundur}</td>
                    <td style="text-align:center;">
                        <button class="action-btn btn-edit" onclick="bukaHalamanEdit('${item.waktuMulai}', '${item.nama}', '${item.kamar}')">✏️</button>
                        <button class="action-btn btn-delete" onclick="selesaikanIzinManual('${item.waktuMulai}', '${item.nama}')">✅</button>
                    </td>
                </tr>
                <tr id="${idDetailDropdown}" class="dropdown-detail-row" style="display:none;">
                    <td colspan="6">
                        <div class="card-detail-info">
                            <p><strong>📝 Alasan / Keterangan Izin:</strong> ${item.keterangan || '-'}</p>
                            <p><strong>👤 Pengurus Penanggung Jawab:</strong> ${item.pengurus || '-'}</p>
                        </div>
                    </td>
                </tr>
            `;
            tabelBody.innerHTML += templateBaris;
        });
    }

    // 4. SELESAI OTOMATIS JIKA WAKTU HABIS
    function pindahOtomatisKeHistoryCloud(itemIzin) {
        const cekSudahAda = riwayatIzinGlobal.some(h => String(h.waktuMulai) === String(itemIzin.waktuMulai));
        if (!cekSudahAda) {
            const copyItem = { ...itemIzin };
            if(copyItem.firebaseKey) delete copyItem.firebaseKey;

            copyItem.keteranganSelesai = "Selesai Otomatis (Waktu Habis)";
            copyItem.statusColor = "#e11d48"; 
            riwayatIzinGlobal.push(copyItem);
            
            db.ref('riwayatIzinAsrama').set(riwayatIzinGlobal).then(() => {
                if(itemIzin.firebaseKey) {
                    db.ref(`dataIzinAsrama/${itemIzin.firebaseKey}`).remove();
                } else {
                    const dataTerfilter = dataIzinGlobal.filter(i => String(i.waktuMulai) !== String(itemIzin.waktuMulai));
                    db.ref('dataIzinAsrama').set(dataTerfilter);
                }
            });
        }
    }

    // 5. TOMBOL SELESAI MANUAL (KLIK TOMBOL CENTANG HIJAU)
    function selesaikanIzinManual(waktuMulai, nama) {
        if (confirm(`Apakah santri "${nama}" sudah kembali ke asrama? Tekan OK untuk menyelesaikan izin.`)) {
            const itemDitemukan = dataIzinGlobal.find(item => String(item.waktuMulai) === String(waktuMulai));
            if (itemDitemukan) {
                const copyItem = { ...itemDitemukan };
                if(copyItem.firebaseKey) delete copyItem.firebaseKey;

                copyItem.keteranganSelesai = "Kembali Lebih Cepat (Manual)";
                copyItem.statusColor = "#2563eb";
                
                riwayatIzinGlobal.push(copyItem);
                
                db.ref('riwayatIzinAsrama').set(riwayatIzinGlobal).then(() => {
                    if(itemDitemukan.firebaseKey) {
                        db.ref(`dataIzinAsrama/${itemDitemukan.firebaseKey}`).remove();
                    } else {
                        const dataTerupdate = dataIzinGlobal.filter(item => String(item.waktuMulai) !== String(waktuMulai));
                        db.ref('dataIzinAsrama').set(dataTerupdate);
                    }
                });
            }
        }
    }

    // 6. NAVIGASI EDIT DATA (KLIK TOMBOL PENSIL)
    function bukaHalamanEdit(waktuMulai, nama, kamar) {
        sessionStorage.setItem('editMode', 'true');
        sessionStorage.setItem('editWaktuMulai', waktuMulai);
        sessionStorage.setItem('tempNama', nama);
        sessionStorage.setItem('tempKamar', kamar);
        window.location.href = 'izin.html';
    }

    // 7. TOGGLE DROPDOWN DETAIL BAWAAN ASLI KAMU
    function toggleDropdown(id, element) {
        const detailRow = document.getElementById(id);
        if (detailRow.style.display === "table-row") {
            detailRow.style.display = "none"; 
            element.classList.remove("active");
        } else {
            detailRow.style.display = "table-row"; 
            element.classList.add("active");
        }
    }

    // Eksekusi data
    tampilkanData();
    setInterval(renderTabelSesuaiStrukturAsli, 10000); 

    // Kontrol highlight menu sidebar aktif bawaan aslimu
    document.querySelectorAll('.sidebar ul li a').forEach(link => link.classList.remove('active'));
    const namaFileAktif = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar ul li a').forEach(link => {
        const hrefTautan = link.getAttribute('href');
        if (namaFileAktif === hrefTautan) { link.classList.add('active'); }
    });
</script>
</body>
</html>
