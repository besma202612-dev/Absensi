<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Absensi Kamar</title>
    <style>
        /* ==================== RESET & BASE LAYOUT ==================== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        .app-container {
            display: flex;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        /* ==================== STYLE NAVIGATOR (SIDEBAR) ==================== */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: #ecf0f1;
            padding-top: 20px;
            position: fixed;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            z-index: 100;
        }

        .sidebar h2 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li a {
            display: block;
            color: #bdc3c7;
            padding: 15px 25px;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .sidebar ul li a:hover {
            color: #ffffff;
            background-color: #34495e;
            padding-left: 35px;
        }

        .sidebar ul li a.active {
            background-color: #3b82f6;
            color: white;
            font-weight: bold;
        }

        /* ==================== AREA KONTEN UTAMA ==================== */
        .main-content {
            margin-left: 250px;
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        .form-box h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group select, .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #f8fafc;
        }

        .form-group select:focus, .form-group input:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
        }

        /* TOMBOL AKSI */
        .btn-submit {
            width: 100%;
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <nav class="sidebar">
            <h2>Menu Utama</h2>
           <ul>
    <li><a href="index.html">📝 Form Absensi</a></li>
    <li><a href="list.html">🚪 Daftar Santri</a></li>
    <li><a href="daftar.html">📋 Rekap Absen</a></li>
    <li><a href="rekap.html">📊 Rekap Per Kamar</a></li>
    <li><a href="izin1.html">📝 Daftar Perizinan</a></li>
    <li><a href="history.html">📜 Riwayat Perizinan</a></li>
    <li><a href="izin2.html">🏥 Riwayat Sakit</a></li>
</ul>
        </nav>

        <main class="main-content">
            <div class="form-box">
                <h1>📝 Form Absensi</h1>
                
                <form id="absensiForm" onsubmit="simpanAbsensi(event)">
                    <div class="form-group">
                        <label for="kamarSelect">🚪 Pilih Kamar</label>
                        <select id="kamarSelect" required>
                            <option value="" disabled selected>-- Pilih Kamar --</option>
                            <script>
                                for(let i=1; i<=13; i++) {
                                    document.write(`<option value="A${i}">Kamar A${i}</option>`);
                                }
                            </script>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="namaInput">👤 Nama Lengkap Santri</label>
                        <input type="text" id="namaInput" placeholder="Masukkan nama santri..." required style="text-transform: uppercase;">
                    </div>

                    <div class="form-group">
                        <label for="statusSelect">📊 Status Presensi</label>
                        <select id="statusSelect" required>
                            <option value="" disabled selected>-- Pilih Status --</option>
                            <option value="Absen">Alpha / Tanpa Keterangan</option>
                            <option value="Izin">Izin / Sakit / Pulang</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-submit">💾 Kirim Presensi</button>
                </form>
            </div>
        </main>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Konfigurasi Firebase Realtime Database Anda
    const firebaseConfig = {
  apiKey: "AIzaSyDIxABuKyV-Yz6QkjTBEoj-tZUlqZFLt1s",
  authDomain: "absensi-besma.firebaseapp.com",
  databaseURL: "https://absensi-besma-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "absensi-besma",
  storageBucket: "absensi-besma.firebasestorage.app",
  messagingSenderId: "903515270638",
  appId: "1:903515270638:web:ba7bd2faa90674ccf6b2ff",
  measurementId: "G-398MW34FYK"
};
    
    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Variabel penampung data cloud lokal
    let globalDataIzinAsrama = [];
    let globalDataAbsensiAsrama = [];

    // Mengambil data secara real-time untuk validasi proteksi izin aktif
    db.ref('dataIzinAsrama').on('value', (snapshot) => {
        globalDataIzinAsrama = snapshot.val() || [];
    });

    // Mengambil data secara real-time untuk penambahan log absensi baru
    db.ref('dataAbsensiAsrama').on('value', (snapshot) => {
        globalDataAbsensiAsrama = snapshot.val() || [];
    });

    // ==================== FUNGSI UTAMA PENYIMPANAN FORM ====================
    function simpanAbsensi(event) {
        event.preventDefault();

        const kamarInput = document.getElementById('kamarSelect').value;
        const namaInput = document.getElementById('namaInput').value.trim().toUpperCase();
        const status = document.getElementById('statusSelect').value;

        // Proteksi pengecekan silang status perizinan yang sedang aktif dari Firebase cloud
        const sedangIzin = globalDataIzinAsrama.some(item => 
            item.nama.trim().toUpperCase() === namaInput && item.kamar === kamarInput
        );

        if (sedangIzin) {
            alert(`Peringatan: ${namaInput} sedang dalam masa izin aktif.`);
            return;
        }

        const hariIni = new Date();
        const tanggal = `${hariIni.getFullYear()}-${String(hariIni.getMonth() + 1).padStart(2, '0')}-${String(hariIni.getDate()).padStart(2, '0')}`;

        if (status === 'Izin') {
            // Jika memilih Izin, lempar data sementara ke form detail izin via sessionStorage
            sessionStorage.setItem('tempNama', namaInput);
            sessionStorage.setItem('tempKamar', kamarInput);
            sessionStorage.setItem('tempTanggal', tanggal);
            window.location.href = 'izin.html';
        } else {
            // Jika memilih Alpha/Absen, masukkan ke dalam log data absensi global
            globalDataAbsensiAsrama.push({ 
                tanggal: tanggal, 
                kamar: kamarInput, 
                nama: namaInput, 
                status: status, 
                keterangan: '' 
            });

            // Set data array terbaru kembali ke Firebase Cloud Node 'dataAbsensiAsrama'
            db.ref('dataAbsensiAsrama').set(globalDataAbsensiAsrama)
                .then(() => {
                    window.location.href = 'daftar.html';
                })
                .catch((error) => {
                    alert("Gagal mengirim data ke cloud: " + error.message);
                });
        }
    }

    // ==================== SAMAKAN LOGIKA NAVIGASI DARI IZIN1.HTML ====================
    document.querySelectorAll('.sidebar ul li a').forEach(link => link.classList.remove('active'));
    const namaFileAktif = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar ul li a').forEach(link => {
        const hrefTautan = link.getAttribute('href');
        if (namaFileAktif === hrefTautan || (namaFileAktif === '' && hrefTautan === 'index.html')) {
            link.classList.add('active');
        }
    });
</script>
</body>
</html>
