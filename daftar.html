<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Rekap Absensi</title>
    <style>
        /* ==================== RESET & BASE LAYOUT ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .app-container { display: flex; min-height: 100vh; background-color: #f0f2f5; }

        /* ==================== STYLE NAVIGATOR (SIDEBAR) ==================== */
        .sidebar { width: 250px; background-color: #2c3e50; color: #ecf0f1; padding-top: 20px; position: fixed; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; z-index: 100; }
        .sidebar h2 { text-align: center; color: #ffffff; margin-bottom: 30px; font-size: 20px; letter-spacing: 1px; }
        .sidebar ul { list-style: none; }
        .sidebar ul li a { display: block; color: #bdc3c7; padding: 15px 25px; text-decoration: none; font-size: 16px; transition: all 0.3s ease; }
        .sidebar ul li a:hover { color: #ffffff; background-color: #34495e; padding-left: 35px; }
        .sidebar ul li a.active { background-color: #3b82f6; color: white; font-weight: bold; }

        /* ==================== AREA KONTEN UTAMA ==================== */
        .main-content { margin-left: 250px; flex: 1; padding: 40px; display: flex; justify-content: center; align-items: flex-start; }
        .rekap-box { background-color: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); width: 100%; max-width: 1000px; }
        .rekap-box h1 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 24px; }

        /* PANEL ATAS & FILTER */
        .panel-kontrol { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; flex-wrap: wrap; }
        .wrapper-filter { display: flex; align-items: center; gap: 10px; }
        .wrapper-filter label { font-weight: 600; color: #475569; font-size: 14px; }
        .input-tanggal { padding: 8px 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; font-weight: bold; color: #1e293b; }
        .input-tanggal:focus { border-color: #3b82f6; }
        
        .btn-hapus-semua { background-color: #dc2626; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-hapus-semua:hover { background-color: #b91c1c; }

        /* STYLE TABEL */
        .rekap-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .rekap-table th, .rekap-table td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .rekap-table th { background-color: #f8fafc; color: #475569; font-weight: 600; font-size: 14px; }
        .rekap-table tr:hover { background-color: #f8fafc; }

        /* BADGE STATUS */
        .badge-status { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; display: inline-block; text-transform: uppercase; }
        .badge-absen { background-color: #fee2e2; color: #dc2626; }
        .badge-izin { background-color: #fef3c7; color: #d97706; }

        .btn-aksi-hapus { background-color: #fff1f2; color: #e11d48; border: 1px solid #fecdd3; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .btn-aksi-hapus:hover { background-color: #ffe4e6; color: #be123c; }

        /* DROPDOWN KETERANGAN */
        .btn-dropdown { background: none; border: none; color: #64748b; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 600; }
        .btn-dropdown:hover { color: #1e293b; }
        .btn-dropdown .panah { transition: transform 0.2s; display: inline-block; }
        .btn-dropdown.active .panah { transform: rotate(180deg); }
        .row-detail { display: none; background-color: #f8fafc; }
        .box-detail { padding: 15px; border-left: 4px solid #cbd5e1; color: #475569; font-size: 14px; }
    </style>
</head>
<body>

    <div class="app-container">
        <nav class="sidebar">
            <h2>Menu Utama</h2>
            <ul>
                <li><a href="index.html">Input Absensi</a></li>
                <li><a href="list.html">Daftar Santri</a></li>
                <li><a href="izin1.html">Perizinan</a></li>
                <li><a href="izin2.html">Rekap Sakit</a></li>
                <li><a href="daftar.html">Alpha</a></li>
                <li><a href="rekap.html">Rekap Kamar</a></li>
                <li><a href="history.html">Riwayat</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="rekap-box">
                <h1>📋 Daftar Rekap Absensi</h1>
                
                <div class="panel-kontrol">
                    <div class="wrapper-filter">
                        <label for="filterTanggal">📅 Filter Tanggal:</label>
                        <input type="date" id="filterTanggal" class="input-tanggal" onchange="tampilkanData()">
                    </div>
                    <button class="btn-hapus-semua" onclick="hapusSemuaData()">🗑️ Hapus Semua Data</button>
                </div>

                <div id="containerTabelRekap">
                    </div>
            </div>
        </main>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Taruh konfigurasi Firebase Realtime Database Anda di sini
    const firebaseConfig = {
        apiKey: "AIzaSyBxA...",
        authDomain: "absensi-besma.firebaseapp.com",
        databaseURL: "https://absensi-besma-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "absensi-besma",
        storageBucket: "absensi-besma.appspot.com",
        messagingSenderId: "1234567890",
        appId: "1:12345678:web:abcd1234"
    };
    
    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Penampung data lokal yang otomatis ter-sinkronisasi dengan awan
    let dataAbsensiGlobal = [];

    // Mengambil data secara Real-time dari Firebase Node 'dataAbsensiAsrama'
    db.ref('dataAbsensiAsrama').on('value', (snapshot) => {
        dataAbsensiGlobal = snapshot.val() || [];
        tampilkanData(); // Render ulang otomatis setiap ada perubahan data di cloud
    });

    // Jalankan set tanggal default saat pertama kali dimuat
    window.onload = function() {
        const inputTanggal = document.getElementById('filterTanggal');
        const sekarang = new Date();
        const offset = sekarang.getTimezoneOffset();
        const hariIni = new Date(sekarang.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
        inputTanggal.value = hariIni;
        tampilkanData();
    };

    function tampilkanData() {
        const filterTanggal = document.getElementById('filterTanggal').value;
        const container = document.getElementById('containerTabelRekap');
        
        // Filter array berdasarkan tanggal pilihan
        const dataTerfilter = dataAbsensiGlobal.filter(item => {
            let tglItem = item.tanggal || "";
            if (tglItem.includes('T')) tglItem = tglItem.split('T')[0];
            return tglItem === filterTanggal;
        });

        if (dataTerfilter.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:#94a3b8; padding:40px; font-style:italic; background:#f8fafc; border:1px dashed #cbd5e1; border-radius:8px;">Tidak ada rekap data absensi pada tanggal ini.</p>`;
            return;
        }

        let htmlTabel = `
            <table class="rekap-table">
                <thead>
                    <tr>
                        <th style="width: 50px; text-align: center;">No</th>
                        <th>Nama Kamar</th>
                        <th>Nama Lengkap</th>
                        <th style="text-align: center;">Status</th>
                        <th>Keterangan Tambahan</th>
                        <th style="width: 100px; text-align: center;">Aksi</th>
                    </tr>
                </thead>
                <tbody>
        `;

        dataTerfilter.forEach((item, index) => {
            const idDropdown = `detail_${index}`;
            const badgeClass = item.status === 'Absen' ? 'badge-absen' : 'badge-izin';
            const teksKeterangan = item.keterangan ? item.keterangan : 'Tidak ada catatan tambahan.';

            htmlTabel += `
                <tr>
                    <td style="text-align: center; color: #64748b; font-weight: 600;">${index + 1}</td>
                    <td style="font-weight: 600; color: #334155;">KAMAR ${item.kamar}</td>
                    <td style="text-transform: uppercase; font-weight: 600; color: #1e293b;">${item.nama}</td>
                    <td style="text-align: center;"><span class="badge-status ${badgeClass}">${item.status}</span></td>
                    <td>
                        <button class="btn-dropdown" onclick="toggleDropdown('${idDropdown}', this)">
                            📄 Lihat Catatan <span class="panah">▼</span>
                        </button>
                    </td>
                    <td style="text-align: center;">
                        <button class="btn-aksi-hapus" onclick="hapusSatuData('${item.nama.replace(/'/g, "\\'")}', '${item.kamar}', '${item.tanggal}', '${item.status}')">
                            🗑️ Hapus
                        </button>
                    </td>
                </tr>
                <tr id="${idDropdown}" class="row-detail">
                    <td colspan="6">
                        <div class="box-detail">
                            <strong>Detail Log Informasi:</strong><br>
                            ${teksKeterangan}
                        </div>
                    </td>
                </tr>
            `;
        });

        htmlTabel += `</tbody></table>`;
        container.innerHTML = htmlTabel;
    }

    function hapusSatuData(nama, kamar, tanggal, status) {
        if (confirm(`Apakah Anda yakin ingin menghapus data rekap ${status} untuk ${nama}?`)) {
            // Cari dan buang item terpilih dari array lokal
            const dataTerupdate = dataAbsensiGlobal.filter(item => {
                return !(item.nama === nama && item.kamar === kamar && item.tanggal === tanggal && item.status === status);
            });

            // Kirim balik array terbaru ke Firebase Cloud
            db.ref('dataAbsensiAsrama').set(dataTerupdate);
        }
    }

    function toggleDropdown(id, element) {
        const detailRow = document.getElementById(id);
        if (detailRow.style.display === "table-row") { 
            detailRow.style.display = "none"; 
            element.classList.remove("active"); 
        } else { 
            detailRow.style.display = "table-row"; 
            element.classList.add("active"); 
        }
    }

    function hapusSemuaData() {
        if(confirm("Apakah Anda yakin ingin menghapus seluruh data absensi?")) { 
            db.ref('dataAbsensiAsrama').remove(); 
        }
    }

    // Penanganan highlight menu sidebar aktif
    document.querySelectorAll('.sidebar ul li a').forEach(link => link.classList.remove('active'));
    const namaFileAktif = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar ul li a').forEach(link => {
        const hrefTautan = link.getAttribute('href');
        if (namaFileAktif === hrefTautan || (namaFileAktif === '' && hrefTautan === 'index.html')) {
            link.classList.add('active');
        }
    });
</script>
</body>
</html>
