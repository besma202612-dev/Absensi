<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Presensi Santri</title>
    <style>
        /* ==================== RESET & BASE LAYOUT ==================== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        .app-container {
            display: flex;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        /* ==================== STYLE NAVIGATOR (SIDEBAR) ==================== */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: #ecf0f1;
            padding-top: 20px;
            position: fixed;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            z-index: 100;
        }

        .sidebar h2 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li a {
            display: block;
            color: #bdc3c7;
            padding: 15px 25px;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .sidebar ul li a:hover {
            color: #ffffff;
            background-color: #34495e;
            padding-left: 35px;
        }

        .sidebar ul li a.active {
            background-color: #3b82f6;
            color: white;
            font-weight: bold;
        }

        /* ==================== AREA KONTEN UTAMA (KANAN) ==================== */
        .main-content {
            margin-left: 250px; 
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* ==================== STYLE BOX DATA KAMAR ==================== */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
        }
        
        .absensi-box { 
            background-color: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); 
            width: 100%; 
            max-width: 800px;
        }
        
        .absensi-box h1 { 
            text-align: center; 
            color: #2c3e50; 
            margin-bottom: 25px; 
            font-size: 24px;
        }

        /* === PANEL AKSI UTAMA & SEARCH === */
        .panel-aksi-utama {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .wrapper-search {
            flex: 1;
            max-width: 300px;
            position: relative;
        }

        .input-search-santri {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .input-search-santri:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* === TOMBOL TAMBAH SANTRI BARU === */
        .btn-tambah-santri {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-tambah-santri:hover {
            background-color: #059669;
            transform: translateY(-1px);
        }

        /* === STYLING TOMBOL BARU UNTUK INPUT MASSAL === */
        .btn-tambah-massal {
            background-color: #d97706;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-tambah-massal:hover {
            background-color: #b45309;
            transform: translateY(-1px);
        }

        /* === GRID TOMBOL KAMAR === */
        .grid-kamar { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 12px; 
            margin-bottom: 10px; 
        }
        .btn-kamar-biasa { 
            background-color: #3b82f6; 
            color: white; 
            border: none; 
            padding: 18px 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            transition: all 0.2s;
        }
        .btn-kamar-biasa:hover { 
            background-color: #2563eb; 
            transform: translateY(-2px);
        }
        .badge-count { 
            background: rgba(255, 255, 255, 0.25); 
            padding: 2px 8px; 
            border-radius: 12px; 
            font-size: 11px; 
        }

        /* === AREA HASIL PENCARIAN GLOBAL === */
        .container-hasil-pencarian {
            margin-top: 10px;
            display: none;
        }
        .judul-pencarian {
            font-size: 16px;
            color: #475569;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* === MODAL POPUP === */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
        }
        .modal.show { 
            display: flex; 
        }
        .modal-content { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            width: 90%; 
            max-width: 650px; 
            max-height: 85vh; 
            overflow-y: auto; 
            position: relative; 
        }
        .close-btn { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            font-size: 24px; 
            cursor: pointer; 
            color: #64748b; 
        }

        /* === PANEL PILIHAN TANGGAL DI MODAL === */
        .panel-tanggal-modal {
            margin: 15px 0 5px 0;
            padding: 12px;
            background-color: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .wrapper-tanggal {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .panel-tanggal-modal label {
            font-weight: 700;
            color: #334155;
            font-size: 14px;
        }
        .input-tanggal-modal {
            padding: 6px 12px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-weight: bold;
            color: #1e293b;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }
        .input-tanggal-modal:focus {
            border-color: #3b82f6;
        }

        /* === TOMBOL GLOBAL RESET === */
        .btn-reset-global {
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-reset-global:hover {
            background-color: #b91c1c;
            transform: translateY(-1px);
        }

        .btn-reset-kamar {
            background-color: #f97316;
            color: white;
            border: none;
            padding: 7px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-reset-kamar:hover {
            background-color: #ea580c;
        }

        /* === STYLE FORM INPUT DI MODAL TAMBAH === */
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-weight: bold;
            color: #475569;
            font-size: 14px;
        }
        .form-control {
            padding: 10px 12px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        .form-control:focus {
            border-color: #3b82f6;
        }
        .btn-submit-santri {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-submit-santri:hover {
            background-color: #2563eb;
        }

        /* === TABEL SISTEM DALAM MODAL & PENCARIAN === */
        .list-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 5px; 
        }
        .list-table th, .list-table td { 
            padding: 12px 10px; 
            border-bottom: 1px solid #e2e8f0; 
            text-align: left; 
        }
        .list-table th { 
            background-color: #f8fafc; 
            color: #475569; 
            font-weight: 600; 
        }

        /* === TOMBOL TOGGLE STATUS LANGSUNG === */
        .btn-toggle-status {
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 115px;
            text-align: center;
            display: inline-block;
        }
        .btn-status-hadir {
            background-color: #e2e8f0;
            color: #475569;
        }
        .btn-status-hadir:hover {
            background-color: #cbd5e1;
        }
        .btn-status-absen {
            background-color: #fee2e2;
            color: #dc2626;
            border: 1px solid #fca5a5;
        }
        .btn-status-absen:hover {
            background-color: #fca5a5;
        }
        .btn-status-izin-aktif {
            background-color: #fef3c7;
            color: #d97706;
            border: 1px solid #fde68a;
            cursor: not-allowed;
        }

        /* === TOMBOL HAPUS NAMA === */
        .btn-hapus-santri {
            background-color: #fff1f2;
            color: #e11d48;
            border: 1px solid #fecdd3;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-hapus-santri:hover {
            background-color: #ffe4e6;
            color: #be123c;
            border-color: #fda4af;
        }

        /* === STYLE ROW KHUSUS SINKRONISASI IZIN === */
        .row-terblokir-izin {
            background-color: #f8fafc !important; 
        }
        .row-terblokir-izin td {
            color: #94a3b8 !important; 
        }
        .row-terblokir-izin span {
            color: #94a3b8 !important;
        }
        
        /* BADGE KAMAR DI SEBELAH NAMA */
        .badge-kamar-info {
            background-color: #e0f2fe;
            color: #0369a1;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 6px;
            display: inline-block;
            border: 1px solid #bae6fd;
        }
    </style>
</head>
<body>

    <div class="app-container">

            <h3 style="margin-top: 0; color: #2c3e50; margin-bottom: 20px;">📥 Tambah Banyak Santri (Paste List)</h3>
            
            <form id="formInputSantriMassal" onsubmit="simpanSantriMassal(event)">
                <div class="form-group">
                    <label for="inputKamarSantriMassal">Pilih Kamar Tujuan:</label>
                    <select id="inputKamarSantriMassal" class="form-control" required>
                        <option value="" disabled selected>-- Pilih Kamar (A1 - A13) --</option>
                        <option value="A1">Kamar A1</option>

                </div>
                <button type="submit" class="btn-submit-santri" style="background-color: #d97706;">📥 Mulai Import Banyak Santri</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 1. KONFIGURASI FIREBASE CLOUD REALTIME DATABASE
    const firebaseConfig = {
      apiKey: "AIzaSyDIxABuKyV-Yz6QkjTBEoj-tZUlqZFLt1s",
      authDomain: "absensi-besma.firebaseapp.com",
      databaseURL: "https://absensi-besma-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "absensi-besma",
      storageBucket: "absensi-besma.firebasestorage.app",
      messagingSenderId: "903515270638",
      appId: "1:903515270638:web:ba7bd2faa90674ccf6b2ff",
      measurementId: "G-398MW34FYK"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // Variabel Penampung Sinkronisasi Cloud
    let dataSantriMaster = [];
    let dataAbsensiAsrama = [];
    let statusIzinSantriAktif = null;
    let statusSantriHarian = {}; 

    let kamarAktifSekarang = "";

    // 2. AMBIL DATA SECARA REALTIME DARI FIREBASE NODE CLOUD
    function listenFirebaseData() {
        db.ref('dataSantriMaster').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val) {
                dataSantriMaster = Object.keys(val).map(key => ({
                    idFirebase: key,
                    ...val[key]
                }));
            } else {
                dataSantriMaster = [];
            }
            renderGridKamar();
            if (kamarAktifSekarang) segarkanIsiFormModal();
            handlePencarianGlobal();
        });

        db.ref('dataAbsensiAsrama').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val) {
                dataAbsensiAsrama = Object.keys(val).map(key => ({
                    idFirebase: key,
                    ...val[key]
                }));
            } else {
                dataAbsensiAsrama = [];
            }
            if (kamarAktifSekarang) segarkanIsiFormModal();
            handlePencarianGlobal();
        });

        db.ref('statusIzinSantriAktif').on('value', (snapshot) => {
            statusIzinSantriAktif = snapshot.val();
            if (kamarAktifSekarang) segarkanIsiFormModal();
            handlePencarianGlobal();
        });
    }

    // === RENDER GRID UTAMA ===
    function renderGridKamar() {
        const gridContainer = document.getElementById('gridKamarContainer');
        
        const hitungKamar = {};
        for (let i = 1; i <= 13; i++) { hitungKamar[`A${i}`] = 0; }
        
        dataSantriMaster.forEach(s => { 
            if (s.kamar) {
                const kClean = s.kamar.trim().toUpperCase().replace("KAMAR", "").trim();
                if (hitungKamar[kClean] !== undefined) {
                    hitungKamar[kClean]++; 
                }
            }
        });

        let htmlGrid = "";
        for (let i = 1; i <= 13; i++) {
            const namaKamar = `A${i}`;
            htmlGrid += `
                <button class="btn-kamar-biasa" onclick="bukaFormSantri('${namaKamar}')">
                    <span>🚪 KAMAR ${namaKamar}</span>
                    <span class="badge-count">${hitungKamar[namaKamar]} Santri</span>
                </button>
            `;
        }
        gridContainer.innerHTML = htmlGrid;
    }

    // === INISIALISASI TANGGAL ===
    function inisialisasiTanggal() {
        const inputTanggal = document.getElementById('pilihTanggalAbsen');
        const tanggalTersimpan = localStorage.getItem('tanggalAbsenTerakhir');
        
        if (tanggalTersimpan) {
            inputTanggal.value = tanggalTersimpan;
        } else {
            const sekarang = new Date();
            const offset = Thermal = sekarang.getTimezoneOffset();
            const tanggalLokal = new Date(sekarang.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
            inputTanggal.value = tanggalLokal;
            localStorage.setItem('tanggalAbsenTerakhir', tanggalLokal);
        }
    }

    // === BUKA MODAL KAMAR ===
    function bukaFormSantri(namaKamar) {
        kamarAktifSekarang = namaKamar;
        document.getElementById('modalJudulKamar').textContent = `🚪 DAFTAR SANTRI KAMAR ${namaKamar}`;
        document.getElementById('pilihTanggalAbsen').value = localStorage.getItem('tanggalAbsenTerakhir');
        segarkanIsiFormModal();
        document.getElementById('modalFormSantri').classList.add('show');
    }

    // === KONTROL PERUBAHAN TANGGAL ===
    function handlePerubahanTanggal() {
        const tanggalBaru = document.getElementById('pilihTanggalAbsen').value;
        localStorage.setItem('tanggalAbsenTerakhir', tanggalBaru);
        if (kamarAktifSekarang) {
            segarkanIsiFormModal();
        }
        handlePencarianGlobal();
    }

    // === LOGIKA MODAL INPUT TAMBAH SANTRI BARU ===
    function bukaModalTambahSantri() {
        document.getElementById('formInputSantriBaru').reset();
        document.getElementById('modalTambahSantri').classList.add('show');
    }

    function paksaTutupModalTambah() {
        document.getElementById('modalTambahSantri').classList.remove('show');
    }

    // === PROSES SIMPAN SINKRONISASI BANYAK SANTRI SEKALIGUS ===
    function simpanSantriMassal(e) {
        e.preventDefault();
        const kamarTerpilih = document.getElementById('inputKamarSantriMassal').value;
        const teksMentah = document.getElementById('textareaListSantri').value;

        if (!kamarTerpilih || !teksMentah.trim()) return;

        // Pecah list teks berdasarkan baris enter, bersihkan spasi, dan saring baris yang kosong
        const kumpulanNama = teksMentah.split('\n')
                                       .map(nama => nama.trim().toUpperCase())
                                       .filter(nama => nama.length > 0);

        if (kumpulanNama.length === 0) {
            alert("Silakan isi nama santri terlebih dahulu!");
            return;
        }

        if (confirm(`Apakah Anda yakin ingin menyimpan ${kumpulanNama.length} santri ini secara langsung ke Kamar ${kamarTerpilih}?`)) {
            const masterRef = db.ref('dataSantriMaster');
            
            // Eksekusi push paralel menggunakan Promise agar stabil dan cepat masuk Firebase
            const semuaProses = kumpulanNama.map(namaSantri => {
                return masterRef.push({
                    nama: namaSantri,
                    kamar: kamarTerpilih
                });
            });

            Promise.all(semuasProses = semuaProses)
                .then(() => {
                    alert(`Selesai! Berhasil mengimport ${kumpulanNama.length} santri ke dalam Kamar ${kamarTerpilih}.`);
                    paksaTutupModalMassal();
                })
                .catch(err => {
                    alert("Gagal melakukan import massal: " + err.message);
                });
        }
    }

    // === CHECKING STATUS PERIZINAN SINKRONISASI ===
    function cekApakahSantriIzin(namaSantri, kamarSantri, tanggalAbsenDipilih) {
        if (!statusIzinSantriAktif) return { status: false, keterangan: "" };
        const namaClean = namaSantri.trim().toUpperCase();
        const kamarClean = kamarSantri.trim().toUpperCase().replace("KAMAR", "").trim();

        let dataIzin = null;
        if (Array.isArray(statusIzinSantriAktif)) {
            dataIzin = statusIzinSantriAktif.find(item => {
                const itemNama = (item.nama || item.namaSantri || "").trim().toUpperCase();
                const itemKamar = (item.kamar || item.kamarSantri || "").trim().toUpperCase().replace("KAMAR", "").trim();
                return itemNama === namaClean && (itemKamar === kamarClean || itemKamar === `A${kamarClean}`);
            });
        } else {
            const keyIzin = `${kamarClean}_${namaClean}`;
            dataIzin = statusIzinSantriAktif[keyIzin];
        }

        if (dataIzin) {
            const tglMulai = dataIzin.tanggalMulai || dataIzin.tglMulai || "";
            const tglSelesai = dataIzin.tanggalSelesai || dataIzin.tglSelesai || "";

            if (tanggalAbsenDipilih >= tglMulai && tanggalAbsenDipilih <= tglSelesai) {
                return { status: true, keterangan: dataIzin.keterangan || "Izin Resmi Asrama" };
            }
        }
        return { status: false, keterangan: "" };
    }

    // === SELESAI & JALANKAN PROGRAM ===
    inisialisasiTanggal();
    listenFirebaseData();

    // Penanganan Highlight Active Sidebar
    const namaFileAktif = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar ul li a').forEach(link => {
        link.classList.remove('active');
        const hrefTautan = link.getAttribute('href');
        if (namaFileAktif === hrefTautan || (namaFileAktif === '' && hrefTautan === 'list.html')) { link.classList.add('active'); }
    });
</script>
</body>
</html>
