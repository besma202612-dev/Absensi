<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Presensi Santri</title>
    <style>
        /* ==================== RESET & BASE LAYOUT ==================== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        .app-container {
            display: flex;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        /* ==================== STYLE NAVIGATOR (SIDEBAR) ==================== */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: #ecf0f1;
            padding-top: 20px;
            position: fixed;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            z-index: 100;
        }

        .sidebar h2 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li a {
            display: block;
            color: #bdc3c7;
            padding: 15px 25px;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .sidebar ul li a:hover {
            color: #ffffff;
            background-color: #34495e;
            padding-left: 35px;
        }

        .sidebar ul li a.active {
            background-color: #3b82f6;
            color: white;
            font-weight: bold;
        }

        /* ==================== AREA KONTEN UTAMA (KANAN) ==================== */
        .main-content {
            margin-left: 250px; 
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* ==================== STYLE BOX DATA KAMAR ==================== */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
        }
        
        .absensi-box { 
            background-color: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); 
            width: 100%; 
            max-width: 800px;
        }
        
        .absensi-box h1 { 
            text-align: center; 
            color: #2c3e50; 
            margin-bottom: 25px; 
            font-size: 24px;
        }

        /* === PANEL AKSI UTAMA & SEARCH === */
        .panel-aksi-utama {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .wrapper-search {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .input-search-santri {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .input-search-santri:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* === GRID TOMBOL KAMAR === */
        .grid-kamar { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 12px; 
            margin-bottom: 10px; 
        }
        .btn-kamar-biasa { 
            background-color: #3b82f6; 
            color: white; 
            border: none; 
            padding: 18px 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            transition: all 0.2s;
        }
        .btn-kamar-biasa:hover { 
            background-color: #2563eb; 
            transform: translateY(-2px);
        }
        .badge-count { 
            background: rgba(255, 255, 255, 0.25); 
            padding: 2px 8px; 
            border-radius: 12px; 
            font-size: 11px; 
        }

        /* === AREA HASIL PENCARIAN GLOBAL === */
        .container-hasil-pencarian {
            margin-top: 10px;
            display: none;
        }
        .judul-pencarian {
            font-size: 16px;
            color: #475569;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* === MODAL POPUP === */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
        }
        .modal.show { 
            display: flex; 
        }
        .modal-content { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            width: 90%; 
            max-width: 650px; 
            max-height: 85vh; 
            overflow-y: auto; 
            position: relative; 
        }
        .close-btn { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            font-size: 24px; 
            cursor: pointer; 
            color: #64748b; 
        }

        /* === PANEL PILIHAN TANGGAL DI MODAL === */
        .panel-tanggal-modal {
            margin: 15px 0 5px 0;
            padding: 12px;
            background-color: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .wrapper-tanggal {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .panel-tanggal-modal label {
            font-weight: 700;
            color: #334155;
            font-size: 14px;
        }
        .input-tanggal-modal {
            padding: 6px 12px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-weight: bold;
            color: #1e293b;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }
        .input-tanggal-modal:focus {
            border-color: #3b82f6;
        }

        /* === TOMBOL GLOBAL RESET === */
        .btn-reset-global {
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-reset-global:hover {
            background-color: #b91c1c;
            transform: translateY(-1px);
        }

        .btn-reset-kamar {
            background-color: #f97316;
            color: white;
            border: none;
            padding: 7px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-reset-kamar:hover {
            background-color: #ea580c;
        }

        /* === TABEL SISTEM DALAM MODAL & PENCARIAN === */
        .list-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 5px; 
        }
        .list-table th, .list-table td { 
            padding: 12px 10px; 
            border-bottom: 1px solid #e2e8f0; 
            text-align: left; 
        }
        .list-table th { 
            background-color: #f8fafc; 
            color: #475569; 
            font-weight: 600; 
        }

        /* === TOMBOL TOGGLE STATUS LANGSUNG === */
        .btn-toggle-status {
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 115px;
            text-align: center;
            display: inline-block;
        }
        .btn-status-hadir {
            background-color: #e2e8f0;
            color: #475569;
        }
        .btn-status-hadir:hover {
            background-color: #cbd5e1;
        }
        .btn-status-absen {
            background-color: #fee2e2;
            color: #dc2626;
            border: 1px solid #fca5a5;
        }
        .btn-status-absen:hover {
            background-color: #fca5a5;
        }
        .btn-status-izin-aktif {
            background-color: #fef3c7;
            color: #d97706;
            border: 1px solid #fde68a;
            cursor: not-allowed;
        }

        /* === TOMBOL HAPUS NAMA === */
        .btn-hapus-santri {
            background-color: #fff1f2;
            color: #e11d48;
            border: 1px solid #fecdd3;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-hapus-santri:hover {
            background-color: #ffe4e6;
            color: #be123c;
            border-color: #fda4af;
        }

        /* === STYLE ROW KHUSUS SINKRONISASI IZIN === */
        .row-terblokir-izin {
            background-color: #f8fafc !important; 
        }
        .row-terblokir-izin td {
            color: #94a3b8 !important; 
        }
        .row-terblokir-izin span {
            color: #94a3b8 !important;
        }
        
        /* BADGE KAMAR DI SEBELAH NAMA */
        .badge-kamar-info {
            background-color: #e0f2fe;
            color: #0369a1;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 6px;
            display: inline-block;
            border: 1px solid #bae6fd;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <nav class="sidebar">
            <h2>Menu Utama</h2>
            <ul>
                <li><a href="index.html">Input Absensi</a></li>
                <li><a href="list.html">Daftar Santri</a></li>
                <li><a href="izin1.html">Perizinan</a></li>
                <li><a href="izin2.html">Rekap Sakit</a></li>
                <li><a href="daftar.html">Alpha</a></li>
                <li><a href="rekap.html">Rekap Kamar</a></li> 
                <li><a href="history.html">Riwayat</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="absensi-box">
                <h1>📋 Daftar & Presensi Santri</h1>
                
                <div class="panel-aksi-utama">
                    <div class="wrapper-search">
                        <input type="text" id="searchGlobalInput" class="input-search-santri" placeholder="🔍 Masukkan nama santri (Semua Kamar)..." oninput="handlePencarianGlobal()">
                    </div>
                    <button class="btn-reset-global" onclick="resetSemuaKamarSekaligus()">🔄 Reset Semua Kamar</button>
                </div>

                <div class="grid-kamar" id="gridKamarContainer"></div>

                <div class="container-hasil-pencarian" id="pencarianGlobalContainer">
                    <div class="judul-pencarian" id="infoJumlahHasil">🔍 Hasil Pencarian:</div>
                    <div id="tabelHasilPencarianGlobal"></div>
                </div>
            </div>
        </main>

    </div>

    <div class="modal" id="modalFormSantri" onclick="tutupFormSantri(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="paksaTutupForm()">&times;</span>
            <h3 id="modalJudulKamar" style="margin-top: 0; color: #2c3e50;">🚪 DAFTAR SANTRI</h3>
            
            <div class="panel-tanggal-modal">
                <div class="wrapper-tanggal">
                    <label for="pilihTanggalAbsen">📅 Tanggal Absensi:</label>
                    <input type="date" id="pilihTanggalAbsen" class="input-tanggal-modal" onchange="handlePerubahanTanggal()">
                </div>
                <button class="btn-reset-kamar" onclick="resetKamarAktif()">🔄 Reset Kamar Ini</button>
            </div>

            <div id="modalIsiSantri"></div>
        </div>
    </div>

<script>
    let kamarAktifSekarang = "";

// === RENDER GRID UTAMA ===
function renderGridKamar() {
    const gridContainer = document.getElementById('gridKamarContainer');
    const dataSantriMaster = JSON.parse(localStorage.getItem('dataSantriMaster')) || [];
    
    const hitungKamar = {};
    for (let i = 1; i <= 13; i++) { hitungKamar[`A${i}`] = 0; }
    dataSantriMaster.forEach(s => { 
        if (s.kamar) {
            const kClean = s.kamar.trim().toUpperCase().replace("KAMAR", "").trim();
            if (hitungKamar[kClean] !== undefined) {
                hitungKamar[kClean]++; 
            }
        }
    });

    let htmlGrid = "";
    for (let i = 1; i <= 13; i++) {
        const namaKamar = `A${i}`;
        htmlGrid += `
            <button class="btn-kamar-biasa" onclick="bukaFormSantri('${namaKamar}')">
                <span>🚪 KAMAR ${namaKamar}</span>
                <span class="badge-count">${hitungKamar[namaKamar]} Santri</span>
            </button>
        `;
    }
    gridContainer.innerHTML = htmlGrid;
}

// === INISIALISASI TANGGAL ===
function inisialisasiTanggal() {
    const inputTanggal = document.getElementById('pilihTanggalAbsen');
    const tanggalTersimpan = localStorage.getItem('tanggalAbsenTerakhir');
    
    if (tanggalTersimpan) {
        inputTanggal.value = tanggalTersimpan;
    } else {
        const sekarang = new Date();
        const offset = sekarang.getTimezoneOffset();
        const tanggalLokal = new Date(sekarang.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
        
        inputTanggal.value = tanggalLokal;
        localStorage.setItem('tanggalAbsenTerakhir', tanggalLokal);
    }
}

// === BUKA MODAL KAMAR ===
function bukaFormSantri(namaKamar) {
    kamarAktifSekarang = namaKamar;
    document.getElementById('modalJudulKamar').textContent = `🚪 DAFTAR SANTRI KAMAR ${namaKamar}`;
    document.getElementById('pilihTanggalAbsen').value = localStorage.getItem('tanggalAbsenTerakhir');

    segarkanIsiFormModal();
    document.getElementById('modalFormSantri').classList.add('show');
}

// === KONTROL PERUBAHAN TANGGAL ===
function handlePerubahanTanggal() {
    const tanggalBaru = document.getElementById('pilihTanggalAbsen').value;
    localStorage.setItem('tanggalAbsenTerakhir', tanggalBaru);
    
    // Sinkronisasi penyegaran data, baik di modal ataupun di list pencarian global
    if (kamarAktifSekarang) {
        segarkanIsiFormModal();
    }
    handlePencarianGlobal();
}

// === LOGIKA PENCARIAN GLOBAL REAL-TIME (SETIAP HURUF TERKONEKSI) ===
function handlePencarianGlobal() {
    const keyword = document.getElementById('searchGlobalInput').value.trim().toLowerCase();
    const gridContainer = document.getElementById('gridKamarContainer');
    const pencarianContainer = document.getElementById('pencarianGlobalContainer');
    const tabelHasilBox = document.getElementById('tabelHasilPencarianGlobal');
    
    // Jika kolom pencarian kosong, kembalikan ke tampilan Grid Kamar biasa
    if (keyword === "") {
        gridContainer.style.display = "grid";
        pencarianContainer.style.display = "none";
        return;
    }

    // Sembunyikan Grid Kamar, tampilkan area hasil pencarian
    gridContainer.style.display = "none";
    pencarianContainer.style.display = "block";

    const dataSantriMaster = JSON.parse(localStorage.getItem('dataSantriMaster')) || [];
    const statusSantriHarian = JSON.parse(localStorage.getItem('statusSantriHarian')) || {};
    const dataAbsensiAsrama = JSON.parse(localStorage.getItem('dataAbsensiAsrama')) || [];
    const tanggalTerpilih = localStorage.getItem('tanggalAbsenTerakhir');
    
    const sekarang = new Date();
    const offset = sekarang.getTimezoneOffset();
    const hariIni = new Date(sekarang.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];

    // Filter data santri dari SEMUA KAMAR secara real-time
    let hasilFilter = dataSantriMaster.filter(s => s.nama && s.nama.toLowerCase().includes(keyword));
    hasilFilter.sort((a, b) => a.nama.localeCompare(b.nama));

    document.getElementById('infoJumlahHasil').textContent = `🔍 Hasil Pencarian: Ditemukan ${hasilFilter.length} Santri`;

    if (hasilFilter.length === 0) {
        tabelHasilBox.innerHTML = `<p style="text-align:center; color:#999; padding:30px; font-style:italic; background:#fff; border-radius:8px; border:1px solid #e2e8f0;">Nama santri tidak ditemukan di kamar manapun.</p>`;
        return;
    }

    let htmlTabel = `
        <table class="list-table" style="background:#fff; border-radius:8px; overflow:hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <thead>
                <tr>
                    <th style="width: 40px; text-align: center;">No</th>
                    <th>Nama Lengkap</th>
                    <th style="width: 140px; text-align: center;">Status Presensi</th>
                    <th style="width: 80px; text-align: center;">Aksi</th>
                </tr>
            </thead>
            <tbody>
    `;

    hasilFilter.forEach((santri, index) => {
        const kClean = (santri.kamar || "").trim().toUpperCase().replace("KAMAR", "").trim();
        const namaKamarLengkap = kClean.startsWith('A') ? kClean : `A${kClean}`;
        
        const namaSantriClean = santri.nama.trim().toLowerCase().replace(/\s+/g, ' ');
        const keyStatus = `${namaKamarLengkap}_${namaSantriClean}`;
        
        const hasilCekIzin = cekApakahSantriIzin(santri.nama, namaKamarLengkap, tanggalTerpilih);

        const adaDiDataLogAbsen = dataAbsensiAsrama.some(item => {
            let tglItem = item.tanggal || "";
            if (tglItem.includes('T')) tglItem = tglItem.split('T')[0];
            const nLog = item.nama.trim().toLowerCase().replace(/\s+/g, ' ');
            const kLog = item.kamar.trim().toUpperCase().replace("KAMAR", "").trim();
            return nLog === namaSantriClean && kLog === kClean && tglItem === tanggalTerpilih;
        });

        let teksTombol = "✓ Hadir";
        let kelasWarnaTombol = "btn-status-hadir";
        let fungsiKlik = `onclick="toggleStatusSantriGlobal('${santri.nama.replace(/'/g, "\\'")}', '${namaKamarLengkap}', 'hadir')"`;
        let trClass = "";
        let infoIzin = "";

        if (hasilCekIzin.status) {
            trClass = "class='row-terblokir-izin'";
            teksTombol = "📝 Izin Aktif";
            kelasWarnaTombol = "btn-status-izin-aktif";
            fungsiKlik = `onclick="peringatanIzinAktif('${santri.nama.replace(/'/g, "\\'")}', '${hasilCekIzin.keterangan.replace(/'/g, "\\'")}')"`;
            
            infoIzin = `
                <small style="display:block; color:#b45309; font-size:11px; font-weight:600; margin-top: 2px;">
                    ⚠️ Hub Perizinan: "${hasilCekIzin.keterangan}"
                </small>
            `;
        } else {
            let statusSekarang = 'hadir';
            if (tanggalTerpilih === hariIni) {
                statusSekarang = statusSantriHarian[keyStatus] || 'hadir';
            } else {
                statusSekarang = adaDiDataLogAbsen ? 'absen' : 'hadir';
            }

            if (statusSekarang === 'absen') {
                teksTombol = "🚫 Absen";
                kelasWarnaTombol = "btn-status-absen";
                fungsiKlik = `onclick="toggleStatusSantriGlobal('${santri.nama.replace(/'/g, "\\'")}', '${namaKamarLengkap}', 'absen')"`;
            }
        }

        htmlTabel += `
            <tr ${trClass}>
                <td style="text-align: center; color: #64748b; font-weight: 600;">${index + 1}</td>
                <td>
                    <span style="text-transform: uppercase; font-weight: 600; color: #1e293b;">${santri.nama}</span>
                    <span class="badge-kamar-info">Kamar ${namaKamarLengkap}</span>
                    ${infoIzin}
                </td>
                <td style="text-align: center;">
                    <button class="btn-toggle-status ${kelasWarnaTombol}" ${fungsiKlik}>
                        ${teksTombol}
                    </button>
                </td>
                <td style="text-align: center;">
                    <button class="btn-hapus-santri" onclick="hapusSantriGlobal('${santri.nama.replace(/'/g, "\\'")}', '${santri.kamar}')">
                        🗑️ Hapus
                    </button>
                </td>
            </tr>
        `;
    });

    htmlTabel += `</tbody></table>`;
    tabelHasilBox.innerHTML = htmlTabel;
}

// === LOGIKA TOGGLE STATUS DARI PENCARIAN GLOBAL ===
function toggleStatusSantriGlobal(namaSantri, namaKamar, statusLama) {
    const tanggalTerpilih = localStorage.getItem('tanggalAbsenTerakhir');
    const sekarang = new Date();
    const offset = sekarang.getTimezoneOffset();
    const hariIni = new Date(sekarang.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
    
    const statusSantriHarian = JSON.parse(localStorage.getItem('statusSantriHarian')) || {};
    const keyStatus = `${namaKamar}_${namaSantri.trim().toLowerCase().replace(/\s+/g, ' ')}`;
    let dataAbsensiAsrama = JSON.parse(localStorage.getItem('dataAbsensiAsrama')) || [];
    const kamarClean = namaKamar.trim().toUpperCase().replace("KAMAR", "").trim();

    if (statusLama === 'absen') {
        if (tanggalTerpilih === hariIni) {
            statusSantriHarian[keyStatus] = 'hadir';
        }
        dataAbsensiAsrama = dataAbsensiAsrama.filter(item => {
            let tglItem = item.tanggal || "";
            if (tglItem.includes('T')) tglItem = tglItem.split('T')[0];
            const nLog = item.nama.trim().toLowerCase().replace(/\s+/g, ' ');
            const kLog = item.kamar.trim().toUpperCase().replace("KAMAR", "").trim();
            return !(nLog === namaSantri.trim().toLowerCase().replace(/\s+/g, ' ') && kLog === kamarClean && tglItem === tanggalTerpilih);
        });
    } else {
        if (tanggalTerpilih === hariIni) {
            statusSantriHarian[keyStatus] = 'absen';
        }
        const sudahAda = dataAbsensiAsrama.some(item => {
            let tglItem = item.tanggal || "";
            if (tglItem.includes('T')) tglItem = tglItem.split('T')[0];
            const nLog = item.nama.trim().toLowerCase().replace(/\s+/g, ' ');
            const kLog = item.kamar.trim().toUpperCase().replace("KAMAR", "").trim();
            return nLog === namaSantri.trim().toLowerCase().replace(/\s+/g, ' ') && kLog === kamarClean && tglItem === tanggalTerpilih;
        });

        if (!sudahAda) {
            dataAbsensiAsrama.push({
                kamar: kamarClean,
                nama: namaSantri.trim().toUpperCase(),
                tanggal: tanggalTerpilih,
                status: "Absen",
                return_date: ""
            });
        }
    }

    localStorage.setItem('statusSantriHarian', JSON.stringify(statusSantriHarian));
    localStorage.setItem('dataAbsensiAsrama', JSON.stringify(dataAbsensiAsrama));
    handlePencarianGlobal(); // Refresh list pencarian langsung
}

// === FUNGSI HAPUS SANTRI DARI PENCARIAN GLOBAL ===
function hapusSantriGlobal(namaSantri, kamarSantri) {
    const konfirmasi = confirm(`Apakah Anda yakin ingin menghapus santri bernama "${namaSantri.toUpperCase()}" dari Kamar ${kamarSantri}?`);
    if (konfirmasi) {
        let dataSantriMaster = JSON.parse(localStorage.getItem('dataSantriMaster')) || [];
        dataSantriMaster = dataSantriMaster.filter(s => {
            return !(s.nama.trim().toUpperCase() === namaSantri.trim().toUpperCase() && s.kamar === kamarSantri);
        });
        localStorage.setItem('dataSantriMaster', JSON.stringify(dataSantriMaster));
        
        handlePencarianGlobal(); // Refresh list pencarian langsung
        renderGridKamar(); // Update counter jumlah santri di grid utama
    }
}

/**
 * LOGIKA PEMERIKSAAN IZIN (Toleransi Semua Format Properti Tanggal)
 */
function cekApakahSantriIzin(namaSantri, kamarSantri, tanggalAbsenDipilih) {
    const rawIzin = localStorage.getItem('statusIzinSantriAktif');
    if (!rawIzin) return { status: false, keterangan: "" };

    let statusIzinSantriAktif;
    try { statusIzinSantriAktif = JSON.parse(rawIzin); } catch(e) { return { status: false, keterangan: "" }; }
    
    const namaClean = namaSantri.trim().toUpperCase();
    const kamarClean = kamarSantri.trim().toUpperCase().replace("KAMAR", "").trim();
    let dataIzin = null;

    if (Array.isArray(statusIzinSantriAktif)) {
        dataIzin = statusIzinSantriAktif.find(item => {
            const itemNama = (item.nama || item.namaSantri || "").trim().toUpperCase();
            const itemKamar = (item.kamar || item.kamarSantri || "").trim().toUpperCase().replace("KAMAR", "").trim();
            return itemNama === namaClean && (itemKamar === kamarClean || itemKamar === `A${kamarClean}`);
        });
    } else {
        const keyIzin = `${kamarClean}_${namaClean}`;
        dataIzin = statusIzinSantriAktif[keyIzin];
    }

    if (dataIzin) {
        const tglMulai = dataIzin.tanggalMulai || dataIzin.tglMulai || dataIzin.tanggal || dataIzin.tgl_mulai || dataIzin.tgl_izin || null; 
        const tglSelesai = dataIzin.tanggalSelesai || dataIzin.tglSelesai || dataIzin.tanggalKembali || dataIzin.tglKembali || dataIzin.tgl_selesai || dataIzin.tgl_kembali || null;

        if (tglMulai && tglSelesai) {
            const tAbsen = new Date(tanggalAbsenDipilih);
            const tMulai = new Date(tglMulai);
            const tSelesai = new Date(tglSelesai);
            tAbsen.setHours(0,0,0,0); tMulai.setHours(0,0,0,0); tSelesai.setHours(0,0,0,0);

            if (tAbsen < tMulai || tAbsen > tSelesai) { return { status: false, keterangan: "" }; }
        }
        return { 
            status: true, 
            keterangan: dataIzin.keterangan || dataIzin.alasan || dataIzin.durasi || "Sedang Keluar Izin Asrama"
        };
    }
    return { status: false, keterangan: "" };
}

// === FUNGSI RESET PER KAMAR ===
function resetKamarAktif() {
    if (!kamarAktifSekarang) return;
    const tanggalTerpilih = localStorage.getItem('tanggalAbsenTerakhir');
    const konfirmasi = confirm(`Apakah Anda yakin ingin mereset semua santri di KAMAR ${kamarAktifSekarang} pada tanggal ${tanggalTerpilih} kembali ke status "Hadir"?\n(Santri berstatus izin tidak akan diubah)`);
    if (!konfirmasi) return;

    const dataSantriMaster = JSON.parse(localStorage.getItem('dataSantriMaster')) || [];
    let statusSantriHarian = JSON.parse(localStorage.getItem('statusSantriHarian')) || {};
    let dataAbsensiAsrama = JSON.parse(localStorage.getItem('dataAbsensiAsrama')) || [];
    const kamarAktifClean = kamarAktifSekarang.trim().toUpperCase().replace("KAMAR", "").trim();

    const santriKamarIni = dataSantriMaster.filter(s => {
        if(!s.kamar) return false;
        return s.kamar.trim().toUpperCase().replace("KAMAR", "").trim() === kamarAktifClean;
    });

    santriKamarIni.forEach(santri => {
        const cekIzin = cekApakahSantriIzin(santri.nama, kamarAktifSekarang, tanggalTerpilih);
        if (cekIzin.status) return;

        const namaSantriClean = santri.nama.trim().toLowerCase().replace(/\s+/g, ' ');
        const keyStatus = `${kamarAktifSekarang}_${namaSantriClean}`;
        statusSantriHarian[keyStatus] = 'hadir';

        dataAbsensiAsrama = dataAbsensiAsrama.filter(item => {
            let tglItem = item.tanggal || "";
            if (tglItem.includes('T')) tglItem = tglItem.split('T')[0];
            const nLog = item.nama.trim().toLowerCase().replace(/\s+/g, ' ');
            const kLog = item.kamar.trim().toUpperCase().replace("KAMAR", "").trim();
            return !(nLog === namaSantriClean && kLog === kamarAktifClean && tglItem === tanggalTerpilih);
        });
    });

    localStorage.setItem('statusSantriHarian', JSON.stringify(statusSantriHarian));
    localStorage.setItem('dataAbsensiAsrama', JSON.stringify(dataAbsensiAsrama));
    segarkanIsiFormModal();
    alert(`Berhasil mereset presensi Kamar ${kamarAktifSekarang}!`);
}

// === FUNGSI RESET SEMUA KAMAR SEKALIGUS ===
function resetSemuaKamarSekaligus() {
    const tanggalTerpilih = localStorage.getItem('tanggalAbsenTerakhir');
    const konfirmasi = confirm(`⚠️ PERINGATAN RE-ABSENSI TOTAL ⚠️\n\nApakah Anda yakin ingin mereset TOTAL seluruh santri di SEMUA KAMAR (A1 s/d A13) pada tanggal ${tanggalTerpilih} kembali ke status "Hadir"?\n\n(Santri berstatus izin aktif di izin1.html aman & tidak ikut direset)`);
    if (!konfirmasi) return;

    const dataSantriMaster = JSON.parse(localStorage.getItem('dataSantriMaster')) || [];
    let statusSantriHarian = JSON.parse(localStorage.getItem('statusSantriHarian')) || {};
    let dataAbsensiAsrama = JSON.parse(localStorage.getItem('dataAbsensiAsrama')) || [];

    dataSantriMaster.forEach(santri => {
        if (!santri.kamar) return;
        const kClean = santri.kamar.trim().toUpperCase().replace("KAMAR", "").trim();
        const namaKamarLengkap = `A${kClean.replace('A', '')}`; 

        const cekIzin = cekApakahSantriIzin(santri.nama, namaKamarLengkap, tanggalTerpilih);
        if (cekIzin.status) return;

        const namaSantriClean = santri.nama.trim().toLowerCase().replace(/\s+/g, ' ');
        const keyStatus = `${namaKamarLengkap}_${namaSantriClean}`;
        statusSantriHarian[keyStatus] = 'hadir';

        dataAbsensiAsrama = dataAbsensiAsrama.filter(item => {
            let tglItem = item.tanggal || "";
            if (tglItem.includes('T')) tglItem = tglItem.split('T')[0];
            const nLog = item.nama.trim().toLowerCase().replace(/\s+/g, ' ');
            const kLog = item.kamar.trim().toUpperCase().replace("KAMAR", "").trim();
            return !(nLog === namaSantriClean && kLog === kClean && tglItem === tanggalTerpilih);
        });
    });

    localStorage.setItem('statusSantriHarian', JSON.stringify(statusSantriHarian));
    localStorage.setItem('dataAbsensiAsrama', JSON.stringify(dataAbsensiAsrama));
    
    if (kamarAktifSekarang) { segarkanIsiFormModal(); }
    handlePencarianGlobal();
    alert(`Berhasil mereset seluruh kamar ke status Hadir di tanggal ${tanggalTerpilih}!`);
}

// === GENERATE TABEL SANTRI DI DALAM MODAL KAMAR ===
function segarkanIsiFormModal() {
    if (!kamarAktifSekarang) return;

    const bodyModal = document.getElementById('modalIsiSantri');
    const dataSantriMaster = JSON.parse(localStorage.getItem('dataSantriMaster')) || [];
    const statusSantriHarian = JSON.parse(localStorage.getItem('statusSantriHarian')) || {};
    const dataAbsensiAsrama = JSON.parse(localStorage.getItem('dataAbsensiAsrama')) || [];
    const tanggalTerpilih = localStorage.getItem('tanggalAbsenTerakhir');
    
    const sekarang = new Date();
    const offset = sekarang.getTimezoneOffset();
    const hariIni = new Date(sekarang.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
    const kamarAktifClean = kamarAktifSekarang.trim().toUpperCase().replace("KAMAR", "").trim();

    let santriKamarIni = dataSantriMaster.filter(s => {
        if(!s.kamar) return false;
        return s.kamar.trim().toUpperCase().replace("KAMAR", "").trim() === kamarAktifClean;
    });
    
    santriKamarIni.sort((a, b) => a.nama.localeCompare(b.nama));

    if (santriKamarIni.length === 0) {
        bodyModal.innerHTML = `<p style="text-align:center; color:#999; padding:20px; font-style:italic;">Belum ada santri terdaftar di kamar ini.</p>`;
        return;
    }

    let htmlTabel = `
        <table class="list-table">
            <thead>
                <tr>
                    <th style="width: 40px; text-align: center;">No</th>
                    <th>Nama Lengkap</th>
                    <th style="width: 110px; text-align: center;">Status Presensi</th>
                    <th style="width: 80px; text-align: center;">Aksi</th>
                </tr>
            </thead>
            <tbody>
    `;

    santriKamarIni.forEach((santri, index) => {
        const namaSantriClean = santri.nama.trim().toLowerCase().replace(/\s+/g, ' ');
        const keyStatus = `${kamarAktifSekarang}_${namaSantriClean}`;
        const hasilCekIzin = cekApakahSantriIzin(santri.nama, kamarAktifSekarang, tanggalTerpilih);

        const adaDiDataLogAbsen = dataAbsensiAsrama.some(item => {
            let tglItem = item.tanggal || "";
            if (tglItem.includes('T')) tglItem = tglItem.split('T')[0];
            const nLog = item.nama.trim().toLowerCase().replace(/\s+/g, ' ');
            const kLog = item.kamar.trim().toUpperCase().replace("KAMAR", "").trim();
            return nLog === namaSantriClean && kLog === kamarAktifClean && tglItem === tanggalTerpilih;
        });

        let teksTombol = "✓ Hadir";
        let kelasWarnaTombol = "btn-status-hadir";
        let fungsiKlik = `onclick="toggleStatusSantriMurni('${santri.nama.replace(/'/g, "\\'")}', 'hadir')"`;
        let trClass = "";
        let infoIzin = "";

        if (hasilCekIzin.status) {
            trClass = "class='row-terblokir-izin'";
            teksTombol = "📝 Izin Aktif";
            kelasWarnaTombol = "btn-status-izin-aktif";
            fungsiKlik = `onclick="peringatanIzinAktif('${santri.nama.replace(/'/g, "\\'")}', '${hasilCekIzin.keterangan.replace(/'/g, "\\'")}')"`;
            infoIzin = `<small style="display:block; color:#b45309; font-size:11px; font-weight:600; margin-top: 2px;">⚠️ Hub Perizinan: "${hasilCekIzin.keterangan}"</small>`;
        } else {
            let statusSekarang = 'hadir';
            if (tanggalTerpilih === hariIni) { statusSekarang = statusSantriHarian[keyStatus] || 'hadir'; } 
            else { statusSekarang = adaDiDataLogAbsen ? 'absen' : 'hadir'; }

            if (statusSekarang === 'absen') {
                teksTombol = "🚫 Absen";
                kelasWarnaTombol = "btn-status-absen";
                fungsiKlik = `onclick="toggleStatusSantriMurni('${santri.nama.replace(/'/g, "\\'")}', 'absen')"`;
            }
        }

        htmlTabel += `
            <tr ${trClass}>
                <td style="text-align: center; color: #64748b; font-weight: 600;">${index + 1}</td>
                <td>
                    <span style="text-transform: uppercase; font-weight: 600; color: #1e293b;">${santri.nama}</span>
                </td>
                <td style="text-align: center;">
                    <button class="btn-toggle-status ${kelasWarnaTombol}" ${fungsiKlik}>${teksTombol}</button>
                </td>
                <td style="text-align: center;">
                    <button class="btn-hapus-santri" onclick="hapusSantriMurni('${santri.nama.replace(/'/g, "\\'")}', '${santri.kamar}')">🗑️ Hapus</button>
                </td>
            </tr>
        `;
    });

    htmlTabel += `</tbody></table>`;
    bodyModal.innerHTML = htmlTabel;
}

function toggleStatusSantriMurni(namaSantri, statusLama) {
    toggleStatusSantriGlobal(namaSantri, kamarAktifSekarang, statusLama);
    segarkanIsiFormModal();
}
function hapusSantriMurni(namaSantri, kamarSantri) {
    const konfirmasi = confirm(`Apakah Anda yakin ingin menghapus santri bernama "${namaSantri.toUpperCase()}" dari Kamar ${kamarSantri}?`);
    if (konfirmasi) {
        let dataSantriMaster = JSON.parse(localStorage.getItem('dataSantriMaster')) || [];
        dataSantriMaster = dataSantriMaster.filter(s => !(s.nama.trim().toUpperCase() === namaSantri.trim().toUpperCase() && s.kamar === kamarSantri));
        localStorage.setItem('dataSantriMaster', JSON.stringify(dataSantriMaster));
        segarkanIsiFormModal();
        renderGridKamar();
    }
}

// === POPUP PERINGATAN REJECT ABSENSI ===
function peringatanIzinAktif(nama, alasan) {
    alert(`TINDAKAN DITOLAK!\n\nSantri bernama "${nama.toUpperCase()}" tidak bisa diubah status presensinya melalui halaman ini karena status perizinannya sedang aktif (Sinkronisasi dari halaman Perizinan).\n\nKeterangan Izin: "${alasan}"`);
}

// === KONTROL TUTUP MODAL ===
function tutupFormSantri(e) { if (e.target.id === 'modalFormSantri') paksaTutupForm(); }
function paksaTutupForm() { document.getElementById('modalFormSantri').classList.remove('show'); kamarAktifSekarang = ""; }

// === NAVIGATOR ACTIVE CONTROLLER ===
const namaFileAktif = window.location.pathname.split('/').pop();
document.querySelectorAll('.sidebar ul li a').forEach(link => {
    link.classList.remove('active');
    const hrefTautan = link.getAttribute('href');
    if (namaFileAktif === hrefTautan || hrefTautan === 'list.html') { link.classList.add('active'); }
});

// EKSEKUSI SAAT HALAMAN SELESAI DI-LOAD
window.onload = function() {
    inisialisasiTanggal(); 
    renderGridKamar();     
};
</script>
